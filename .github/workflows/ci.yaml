name: Backend CI/CD

on:
  push:
    branches:
      - master
      - development
  pull_request:
    branches:
      - master
      - development

env:
  NODE_VERSION: "22"

jobs:
  # ─────────────────────────────────────
  # JOB 1 - Code Quality
  # ─────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Type Check
        run: npx tsc --noEmit

  # ─────────────────────────────────────
  # JOB 2 - Build
  # ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────
  # JOB 3 - Security Scan
  # ─────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Audit Dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for Secrets in Code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  # ─────────────────────────────────────
  # JOB 4 - API Tests
  # ─────────────────────────────────────
  test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: carpooltest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/carpooltest
      DIRECT_URL: postgresql://testuser:testpassword@localhost:5432/carpooltest
      JWT_SECRET: test_jwt_secret_key_for_ci_minimum_32_chars
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_key_for_ci_min
      NODE_ENV: test
      PORT: 5000
      UPSTASH_REDIS_URL: http://localhost:6379
      UPSTASH_REDIS_TOKEN: test
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: "587"
      SMTP_USER: test@ethereal.email
      SMTP_PASS: testpassword
      SMTP_FROM: test@carpoolapp.com
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      GEOAPIFY_API_KEY: test
      ORS_API_KEY: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Database Migrations
        run: npx prisma migrate deploy

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run Tests
        run: npm test
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────
  # JOB 5 - Deploy (master only)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Wait for Deployment
        run: sleep 60

      - name: Health Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PRODUCTION_URL }}/health)
          if [ $response -ne 200 ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          echo "✅ Health check passed!"

  # ─────────────────────────────────────
  # JOB 6 - Notify
  # ─────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, build, security, deploy]
    if: always()

    steps:
      - name: Send Success Notification
        if: needs.deploy.result == 'success'
        run: echo "✅ Deployment successful!"

      - name: Send Failure Notification
        if: needs.deploy.result == 'failure'
        run: echo "❌ Deployment failed!"
